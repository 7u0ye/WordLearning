<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Livehouse study illustration</title>
  <desc id="desc">A quiet music club inspired study scene with a guitar, soft lights, and vocabulary cards.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#26212a"/>
      <stop offset=".48" stop-color="#18161b"/>
      <stop offset="1" stop-color="#111014"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1" y1="0" y2="1">
